<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Demo — Claude Camera</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0f0f11;--card:#1a1a1e;--border:rgba(255,255,255,0.08);--text:#f0f0f2;--dim:#9a9aa5;--accent:#d97706;--accent2:#f59e0b;--blue:#2563eb;--red:#ef2222;--green:#18b818}
html,body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:15px;height:100%;overflow:hidden}

nav{position:fixed;top:0;left:0;right:0;z-index:100;background:rgba(15,15,17,0.9);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:0 20px;height:52px;display:flex;align-items:center;justify-content:space-between}
.nav-logo{display:flex;align-items:center;gap:9px;font-weight:700;font-size:14px;color:var(--text);text-decoration:none}
.nav-links{display:flex;align-items:center;gap:6px}
.nav-links a{color:var(--dim);font-size:13px;text-decoration:none;padding:5px 11px;border-radius:7px;transition:color .15s,background .15s}
.nav-links a:hover{color:var(--text);background:rgba(255,255,255,.07)}
.nav-cta{background:var(--accent)!important;color:#fff!important;font-weight:600;transition:background .2s,transform .15s!important}
.nav-cta:hover{background:var(--accent2)!important;transform:scale(1.04)!important}

/* Layout */
.app{display:flex;height:calc(100vh - 52px);margin-top:52px}
.sidebar{width:280px;flex-shrink:0;background:var(--card);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}

/* Sidebar */
.sidebar-header{padding:16px;border-bottom:1px solid var(--border)}
.sidebar-header h2{font-size:13px;font-weight:600;color:var(--dim);text-transform:uppercase;letter-spacing:.06em}
.strip-wrap{flex:1;overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:8px}
.strip-wrap::-webkit-scrollbar{width:4px}
.strip-wrap::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:2px}
.thumb-item{position:relative;border-radius:8px;overflow:hidden;border:2px solid transparent;cursor:pointer;transition:border-color .15s,transform .15s;aspect-ratio:16/10}
.thumb-item img{width:100%;height:100%;object-fit:cover;display:block}
.thumb-item:hover{transform:scale(1.02);border-color:var(--accent)}
.thumb-del{position:absolute;top:5px;right:5px;width:20px;height:20px;border-radius:50%;background:rgba(0,0,0,.7);border:none;color:#fff;font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .15s,background .15s}
.thumb-item:hover .thumb-del{opacity:1}
.thumb-del:hover{background:var(--red)}
.empty-strip{color:var(--dim);font-size:12px;text-align:center;padding:32px 16px;line-height:1.6;border:1px dashed rgba(255,255,255,.1);border-radius:8px}

.sidebar-footer{padding:12px;border-top:1px solid var(--border);display:flex;flex-direction:column;gap:8px}
.btn-download{display:flex;align-items:center;justify-content:center;gap:7px;padding:10px;border-radius:8px;background:var(--blue);color:#fff;border:none;font-size:13px;font-weight:600;cursor:pointer;width:100%;transition:opacity .15s,transform .15s cubic-bezier(.34,1.56,.64,1)}
.btn-download:hover{opacity:.88;transform:scale(1.02)}
.btn-download:disabled{opacity:.35;cursor:not-allowed;transform:none}
.btn-clipboard{display:flex;align-items:center;justify-content:center;gap:7px;padding:9px;border-radius:8px;background:rgba(255,255,255,.07);color:var(--text);border:1px solid var(--border);font-size:13px;font-weight:500;cursor:pointer;width:100%;transition:background .15s}
.btn-clipboard:hover{background:rgba(255,255,255,.12)}
.btn-clipboard:disabled{opacity:.35;cursor:not-allowed}

/* Main area */
.view-area{flex:1;background:#000;position:relative;display:flex;align-items:center;justify-content:center;overflow:hidden}
.ccam-video{width:100%;height:100%;object-fit:cover;transform-origin:center}
.annotate-wrap{position:relative;width:100%;height:100%;display:flex;align-items:center;justify-content:center}
.photo-canvas{max-width:100%;max-height:100%;object-fit:contain;display:block}
.draw-canvas{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);max-width:100%;max-height:100%;cursor:crosshair;touch-action:none}

/* Bottom toolbar */
.toolbar{flex-shrink:0;background:var(--card);border-top:1px solid var(--border);padding:12px 16px;display:flex;align-items:center;gap:12px}

/* Live toolbar */
.live-tools{display:flex;align-items:center;gap:12px;width:100%}
.zoom-row{display:flex;align-items:center;gap:8px;flex:1;color:var(--dim)}
.zoom-slider{flex:1;-webkit-appearance:none;height:4px;border-radius:2px;background:rgba(255,255,255,.15);outline:none;cursor:pointer}
.zoom-slider::-webkit-slider-thumb{-webkit-appearance:none;width:16px;height:16px;border-radius:50%;background:#fff;cursor:pointer;box-shadow:0 2px 6px rgba(0,0,0,.4)}
.btn-flip{display:inline-flex;align-items:center;justify-content:center;width:36px;height:36px;border-radius:8px;background:rgba(255,255,255,.08);border:1px solid var(--border);color:var(--text);cursor:pointer;transition:background .15s,transform .2s cubic-bezier(.34,1.56,.64,1)}
.btn-flip:hover{background:rgba(255,255,255,.15);transform:scale(1.1)}
.btn-capture{padding:10px 28px;border-radius:8px;background:var(--accent);color:#fff;border:none;font-size:14px;font-weight:600;cursor:pointer;transition:background .15s,transform .2s cubic-bezier(.34,1.56,.64,1)}
.btn-capture:hover{background:var(--accent2);transform:scale(1.05)}

/* Annotate toolbar */
.annotate-tools{display:flex;align-items:center;gap:10px;width:100%}
.color-group{display:flex;gap:8px;align-items:center}
.color-dot{width:26px;height:26px;border-radius:50%;border:3px solid transparent;cursor:pointer;transition:border-color .15s,transform .15s;box-shadow:0 0 0 1px rgba(255,255,255,.2);outline:none}
.color-dot:hover{transform:scale(1.15)}
.color-dot.active{border-color:#fff;transform:scale(1.15)}
.eraser-btn{width:28px;height:28px;border-radius:50%;border:3px solid transparent;background:rgba(255,255,255,.12);color:#ddd;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;transition:border-color .15s,transform .15s,background .15s;box-shadow:0 0 0 1px rgba(255,255,255,.2);margin-left:4px}
.eraser-btn:hover{transform:scale(1.15);background:rgba(255,255,255,.2)}
.eraser-btn.active{border-color:#fff;transform:scale(1.15)}
.divider{width:1px;height:28px;background:var(--border);flex-shrink:0}
.undo-group{display:flex;gap:4px}
.undo-btn,.redo-btn{width:30px;height:30px;border-radius:7px;border:none;background:rgba(255,255,255,.08);color:#ddd;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;transition:background .15s,transform .15s}
.undo-btn:hover:not(:disabled),.redo-btn:hover:not(:disabled){background:rgba(255,255,255,.18);transform:scale(1.1)}
.undo-btn:disabled,.redo-btn:disabled{opacity:.3;cursor:not-allowed}
.spacer{flex:1}
.btn-retake{padding:8px 16px;border-radius:7px;background:rgba(255,255,255,.07);color:var(--text);border:1px solid var(--border);font-size:13px;cursor:pointer;transition:background .15s}
.btn-retake:hover{background:rgba(255,255,255,.14)}
.btn-done{padding:8px 20px;border-radius:7px;background:var(--blue);color:#fff;border:none;font-size:13px;font-weight:600;cursor:pointer;transition:opacity .15s,transform .2s cubic-bezier(.34,1.56,.64,1)}
.btn-done:hover{opacity:.88;transform:scale(1.04)}

/* Camera permission error */
.cam-error{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;color:var(--dim);font-size:14px;text-align:center;padding:32px}
.cam-error svg{opacity:.4;margin-bottom:4px}

/* Toast */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:#1e2a1e;border:1px solid #2d4a2d;color:#86efac;padding:10px 20px;border-radius:10px;font-size:13px;font-weight:500;transition:transform .3s cubic-bezier(.34,1.56,.64,1);z-index:999;pointer-events:none}
.toast.show{transform:translateX(-50%) translateY(0)}

@media(max-width:640px){
  .sidebar{display:none}
  .live-tools{flex-wrap:wrap}
}
</style>
</head>
<body>

<nav>
  <a href="index.html" class="nav-logo">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#d97706" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
    Claude Camera <span style="color:var(--dim);font-weight:400;margin-left:6px">— demo</span>
  </a>
  <div class="nav-links">
    <a href="index.html">Home</a>
    <a href="privacy.html">Privacy</a>
    <a href="https://chrome.google.com/webstore" class="nav-cta">Install free →</a>
  </div>
</nav>

<div class="app">
  <!-- Sidebar: saved photos -->
  <aside class="sidebar">
    <div class="sidebar-header"><h2>Captured photos</h2></div>
    <div class="strip-wrap" id="strip">
      <div class="empty-strip">Photos you capture will appear here. Take a few shots and annotate them!</div>
    </div>
    <div class="sidebar-footer">
      <button class="btn-download" id="btn-download" disabled>
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        Download all (<span id="photo-count">0</span>)
      </button>
      <button class="btn-clipboard" id="btn-clipboard" disabled>
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
        Copy last to clipboard
      </button>
    </div>
  </aside>

  <!-- Main: camera / annotate -->
  <main class="main">
    <div class="view-area" id="view-area">
      <video id="video" class="ccam-video" autoplay playsinline muted></video>
      <div id="annotate-wrap" class="annotate-wrap" style="display:none">
        <canvas id="photo-canvas" class="photo-canvas"></canvas>
        <canvas id="draw-canvas" class="draw-canvas"></canvas>
      </div>
    </div>

    <!-- Live toolbar -->
    <div class="toolbar" id="live-toolbar">
      <div class="live-tools">
        <div class="zoom-row">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/><line x1="11" y1="8" x2="11" y2="14"/><line x1="8" y1="11" x2="14" y2="11"/></svg>
          <input type="range" id="zoom" class="zoom-slider" min="1" max="3" step="0.05" value="1">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/><line x1="8" y1="11" x2="14" y2="11"/></svg>
        </div>
        <button class="btn-flip" id="btn-flip" title="Flip camera">
          <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 4v6h6"/><path d="M23 20v-6h-6"/><path d="M20.49 9A9 9 0 0 0 5.64 5.64L1 10m22 4-4.64 4.36A9 9 0 0 1 3.51 15"/></svg>
        </button>
        <button class="btn-capture" id="btn-capture">Capture</button>
      </div>
    </div>

    <!-- Annotate toolbar -->
    <div class="toolbar" id="annotate-toolbar" style="display:none">
      <div class="annotate-tools">
        <div class="color-group">
          <button class="color-dot active" data-color="#1a6eff" style="background:#1a6eff" title="Blue"></button>
          <button class="color-dot" data-color="#ef2222" style="background:#ef2222" title="Red"></button>
          <button class="color-dot" data-color="#18b818" style="background:#18b818" title="Green"></button>
          <button class="color-dot" data-color="#111111" style="background:#111111" title="Black"></button>
          <button class="eraser-btn" id="eraser-btn" title="Eraser">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 20H7L3 16C2.5 15.5 2.5 14.5 3 14L13 4C13.5 3.5 14.5 3.5 15 4L21 10C21.5 10.5 21.5 11.5 21 12L11 22"/><line x1="18" y1="13" x2="9" y2="4"/></svg>
          </button>
        </div>
        <div class="divider"></div>
        <div class="undo-group">
          <button class="undo-btn" id="undo-btn" title="Undo (⌘Z)" disabled>
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/></svg>
          </button>
          <button class="redo-btn" id="redo-btn" title="Redo (⌘⇧Z)" disabled>
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
          </button>
        </div>
        <div class="spacer"></div>
        <button class="btn-retake" id="btn-retake">Retake</button>
        <button class="btn-done" id="btn-done">Done ✓</button>
      </div>
    </div>
  </main>
</div>

<div class="toast" id="toast"></div>

<script>
'use strict';

// — Elements —
const video          = document.getElementById('video');
const viewArea       = document.getElementById('view-area');
const annotateWrap   = document.getElementById('annotate-wrap');
const photoCanvas    = document.getElementById('photo-canvas');
const drawCanvas     = document.getElementById('draw-canvas');
const liveToolbar    = document.getElementById('live-toolbar');
const annotateToolbar= document.getElementById('annotate-toolbar');
const zoomSlider     = document.getElementById('zoom');
const flipBtn        = document.getElementById('btn-flip');
const captureBtn     = document.getElementById('btn-capture');
const retakeBtn      = document.getElementById('btn-retake');
const doneBtn        = document.getElementById('btn-done');
const undoBtn        = document.getElementById('undo-btn');
const redoBtn        = document.getElementById('redo-btn');
const eraserBtn      = document.getElementById('eraser-btn');
const strip          = document.getElementById('strip');
const photoCount     = document.getElementById('photo-count');
const downloadBtn    = document.getElementById('btn-download');
const clipboardBtn   = document.getElementById('btn-clipboard');
const colorDots      = document.querySelectorAll('.color-dot');
const toast          = document.getElementById('toast');

// — State —
let stream      = null;
let facingMode  = 'user';
let zoomLevel   = 1;
let photos      = [];
let drawColor   = '#1a6eff';
let isErasing   = false;
let isDrawing   = false;
let lastX = 0, lastY = 0;
let history     = [];
let histStep    = -1;
let mode        = 'live';

// — Toast —
let toastTimer;
function showToast(msg) {
  toast.textContent = msg;
  toast.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => toast.classList.remove('show'), 2200);
}

// — Camera —
async function startCamera() {
  try {
    if (stream) stream.getTracks().forEach(t => t.stop());
    stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode, width: { ideal: 1920 }, height: { ideal: 1080 } },
      audio: false,
    });
    video.srcObject = stream;
    video.style.transform = facingMode === 'user' ? 'scaleX(-1)' : '';
    zoomSlider.value = '1';
    zoomLevel = 1;
  } catch (err) {
    viewArea.innerHTML = `<div class="cam-error">
      <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/><line x1="2" y1="2" x2="22" y2="22" stroke="#ef4444"/></svg>
      <strong style="color:#f0f0f2">Camera access denied</strong>
      <span>Allow camera access in your browser to use the demo.</span>
    </div>`;
  }
}

zoomSlider.addEventListener('input', () => {
  zoomLevel = parseFloat(zoomSlider.value);
  video.style.transform = (facingMode === 'user' ? 'scaleX(-1) ' : '') + `scale(${zoomLevel})`;
});

flipBtn.addEventListener('click', async () => {
  facingMode = facingMode === 'user' ? 'environment' : 'user';
  await startCamera();
});

// — Modes —
function toLive() {
  mode = 'live';
  video.style.display = '';
  annotateWrap.style.display = 'none';
  liveToolbar.style.display = '';
  annotateToolbar.style.display = 'none';
  startCamera();
}

function toAnnotate() {
  mode = 'annotate';
  video.style.display = 'none';
  annotateWrap.style.display = '';
  liveToolbar.style.display = 'none';
  annotateToolbar.style.display = '';
  if (stream) stream.getTracks().forEach(t => t.stop());
  resetHistory();
  // Size draw canvas to match photo canvas display
  requestAnimationFrame(() => {
    const r = photoCanvas.getBoundingClientRect();
    drawCanvas.style.width  = r.width + 'px';
    drawCanvas.style.height = r.height + 'px';
  });
}

// — Capture —
captureBtn.addEventListener('click', () => {
  const vw = video.videoWidth, vh = video.videoHeight;
  if (!vw || !vh) return;
  const cw = Math.round(vw / zoomLevel), ch = Math.round(vh / zoomLevel);
  const cx = Math.round((vw - cw) / 2),  cy = Math.round((vh - ch) / 2);
  photoCanvas.width  = cw;
  photoCanvas.height = ch;
  drawCanvas.width   = cw;
  drawCanvas.height  = ch;
  const ctx = photoCanvas.getContext('2d');
  if (facingMode === 'user') {
    ctx.translate(cw, 0); ctx.scale(-1, 1);
    ctx.drawImage(video, cx, cy, cw, ch, 0, 0, cw, ch);
    ctx.setTransform(1,0,0,1,0,0);
  } else {
    ctx.drawImage(video, cx, cy, cw, ch, 0, 0, cw, ch);
  }
  toAnnotate();
});

// — Drawing —
function getPos(e, canvas) {
  const rect = canvas.getBoundingClientRect();
  const src  = e.touches ? e.touches[0] : e;
  return [
    (src.clientX - rect.left) * (canvas.width  / rect.width),
    (src.clientY - rect.top)  * (canvas.height / rect.height),
  ];
}
function drawStart(e) {
  e.preventDefault();
  isDrawing = true;
  [lastX, lastY] = getPos(e, drawCanvas);
}
function drawMove(e) {
  e.preventDefault();
  if (!isDrawing) return;
  const [x, y] = getPos(e, drawCanvas);
  const ctx = drawCanvas.getContext('2d');
  if (isErasing) {
    ctx.globalCompositeOperation = 'destination-out';
    ctx.lineWidth = Math.max(20, drawCanvas.width * 0.025);
  } else {
    ctx.globalCompositeOperation = 'source-over';
    ctx.strokeStyle = drawColor;
    ctx.lineWidth   = Math.max(3, drawCanvas.width * 0.004);
  }
  ctx.lineCap = 'round'; ctx.lineJoin = 'round';
  ctx.beginPath(); ctx.moveTo(lastX, lastY); ctx.lineTo(x, y); ctx.stroke();
  [lastX, lastY] = [x, y];
}
function drawEnd(e) {
  if (!isDrawing) return;
  e.preventDefault();
  isDrawing = false;
  pushHistory();
}
drawCanvas.addEventListener('mousedown',  drawStart);
drawCanvas.addEventListener('mousemove',  drawMove);
drawCanvas.addEventListener('mouseup',    drawEnd);
drawCanvas.addEventListener('mouseleave', drawEnd);
drawCanvas.addEventListener('touchstart', drawStart, { passive: false });
drawCanvas.addEventListener('touchmove',  drawMove,  { passive: false });
drawCanvas.addEventListener('touchend',   drawEnd,   { passive: false });

// — Colors / eraser —
colorDots.forEach(dot => {
  dot.addEventListener('click', () => {
    colorDots.forEach(d => d.classList.remove('active'));
    eraserBtn.classList.remove('active');
    dot.classList.add('active');
    drawColor = dot.dataset.color;
    isErasing = false;
    drawCanvas.style.cursor = 'crosshair';
  });
});
eraserBtn.addEventListener('click', () => {
  colorDots.forEach(d => d.classList.remove('active'));
  eraserBtn.classList.add('active');
  isErasing = true;
  drawCanvas.style.cursor = 'cell';
});

// — Undo / redo —
function resetHistory() {
  history = [null]; histStep = 0; updateUndoRedo();
}
function pushHistory() {
  history = history.slice(0, histStep + 1);
  history.push(drawCanvas.toDataURL());
  if (history.length > 25) history.shift();
  histStep = history.length - 1;
  updateUndoRedo();
}
function restoreHistory() {
  const ctx = drawCanvas.getContext('2d');
  ctx.clearRect(0, 0, drawCanvas.width, drawCanvas.height);
  const snap = history[histStep];
  if (snap) { const img = new Image(); img.onload = () => { ctx.clearRect(0,0,drawCanvas.width,drawCanvas.height); ctx.drawImage(img,0,0); }; img.src = snap; }
  updateUndoRedo();
}
function updateUndoRedo() {
  undoBtn.disabled = histStep <= 0;
  redoBtn.disabled = histStep >= history.length - 1;
}
undoBtn.addEventListener('click', () => { if (histStep > 0) { histStep--; restoreHistory(); } });
redoBtn.addEventListener('click', () => { if (histStep < history.length-1) { histStep++; restoreHistory(); } });

// — Retake / done —
retakeBtn.addEventListener('click', () => toLive());

doneBtn.addEventListener('click', () => {
  const out = document.createElement('canvas');
  out.width = photoCanvas.width; out.height = photoCanvas.height;
  const ctx = out.getContext('2d');
  ctx.drawImage(photoCanvas, 0, 0);
  ctx.drawImage(drawCanvas,  0, 0);
  out.toBlob(blob => {
    const url = URL.createObjectURL(blob);
    photos.push({ blob, url });
    renderStrip();
    toLive();
    showToast('Photo saved ✓');
  }, 'image/jpeg', 0.92);
});

// — Strip —
function renderStrip() {
  photoCount.textContent = photos.length;
  downloadBtn.disabled   = !photos.length;
  clipboardBtn.disabled  = !photos.length;
  strip.innerHTML = '';
  if (!photos.length) {
    strip.innerHTML = '<div class="empty-strip">Photos you capture will appear here. Take a few shots and annotate them!</div>';
    return;
  }
  photos.forEach((p, i) => {
    const wrap = document.createElement('div');
    wrap.className = 'thumb-item';
    wrap.innerHTML = `<img src="${p.url}" alt="Photo ${i+1}"><button class="thumb-del">&times;</button>`;
    wrap.querySelector('.thumb-del').addEventListener('click', (e) => {
      e.stopPropagation();
      URL.revokeObjectURL(photos[i].url);
      photos.splice(i, 1);
      renderStrip();
    });
    strip.appendChild(wrap);
  });
}

// — Download all —
downloadBtn.addEventListener('click', async () => {
  for (let i = 0; i < photos.length; i++) {
    const a = document.createElement('a');
    a.href = photos[i].url;
    a.download = `claude-camera-${i+1}.jpg`;
    a.click();
    await new Promise(r => setTimeout(r, 200));
  }
  showToast(`Downloaded ${photos.length} photo${photos.length > 1 ? 's' : ''}`);
});

// — Copy to clipboard —
clipboardBtn.addEventListener('click', async () => {
  if (!photos.length) return;
  try {
    const last = photos[photos.length - 1];
    const tmp = document.createElement('canvas');
    const img = new Image();
    await new Promise(res => { img.onload = res; img.src = last.url; });
    tmp.width = img.width; tmp.height = img.height;
    tmp.getContext('2d').drawImage(img, 0, 0);
    const pngBlob = await new Promise(res => tmp.toBlob(res, 'image/png'));
    await navigator.clipboard.write([new ClipboardItem({ 'image/png': pngBlob })]);
    showToast('Copied to clipboard ✓');
  } catch (err) {
    showToast('Clipboard access denied');
  }
});

// — Keyboard shortcuts —
document.addEventListener('keydown', e => {
  if (mode !== 'annotate') return;
  const meta = e.metaKey || e.ctrlKey;
  if (meta && e.key.toLowerCase() === 'z') {
    e.preventDefault();
    if (e.shiftKey) { if (histStep < history.length-1) { histStep++; restoreHistory(); } }
    else            { if (histStep > 0)                 { histStep--; restoreHistory(); } }
  }
});

// — Init —
startCamera();
renderStrip();
</script>
